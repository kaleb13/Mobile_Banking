name: mobile_banking_app
description: "A smart SMS banking tracker app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_sms_inbox: any
  sqflite: any
  path_provider: any
  provider: any
  intl: any
  google_fonts: any
  shared_preferences: any
  permission_handler: any # For SMS permissions
  path: any
  flutter_background_service: ^5.1.0
  flutter_local_notifications: ^20.1.0
  telephony: ^0.2.0
  flutter_background_service_android: ^6.3.1
  flutter_svg: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: any

flutter:
  uses-material-design: true
  assets:
    - assets/images/
